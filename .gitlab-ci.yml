stages:
  - build
  - release

build_image:
  stage: build
  image: docker:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_TAG || $CI_MERGE_REQUEST_ID'
  services:
    - docker:dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY;
    # tag is CI_COMMIT_REF_NAME, which is main or the tag name for branches use CI_COMMIT_REF_SLUG
    - if [[ "$CI_COMMIT_BRANCH" == "main" || -n "$CI_COMMIT_TAG" ]]; then
        export IMAGE_TAG=$CI_COMMIT_REF_NAME;
      else
        export IMAGE_TAG=$CI_COMMIT_REF_SLUG;
      fi
    - docker context create builder
    - docker buildx create builder --driver docker-container --use
    - docker buildx build -t $CI_REGISTRY_IMAGE/gitlab-lint:$IMAGE_TAG --load --cache-from type=registry,ref=$CI_REGISTRY_IMAGE/gitlab-lint:cache --cache-to type=registry,ref=$CI_REGISTRY_IMAGE/gitlab-lint:cache,mode=max .
    - if [[ "$CI_COMMIT_BRANCH" == "main" || -n "$CI_COMMIT_TAG" ]]; then
        echo "Pushing Docker image to registry...";
        docker push $CI_REGISTRY_IMAGE/gitlab-lint:$IMAGE_TAG;
      else
        echo "Not pushing Docker image to registry, skipping...";
      fi

create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  script: echo "Creating release $CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release $CI_COMMIT_TAG of components in $CI_PROJECT_PATH"