spec:
  component: [version]
  inputs:
    stage:
      default: test
      description: "The stage to run the linting job in"
    auto_fix:
      default: "false"
      type: boolean
      description: "Whether to auto-fix issues where possible"
    commit:
      default: "false"
      type: boolean
      description: "Whether to commit auto-fixed changes"
    commit_message:
      default: "style: fix linting issues for ${linter}"
      description: "Message to use for auto-fix commits. ${linter} is replaced with linter name."
    git_no_verify:
      default: "false"
      type: boolean
      description: "Whether to skip git verification (pre-commit hooks) when committing"
    continue_on_error:
      default: "false"
      type: boolean
      description: "Whether to continue the pipeline on linting failure"
    report_path:
      default: "gl-code-quality-report.json"
      description: "Path to the code quality report artifact"
    git_user:
      default: "GitLab CI"
      description: "Git user name for auto-fix commits"
    git_email:
      default: "gitlab-ci@gitlab.com"
      description: "Git email for auto-fix commits"
    access_token:
      default: ""
      description: "GitLab access token for pushing auto-fixes (optional, requires write access)"

    # Prettier Configuration
    prettier:
      default: "false"
      type: boolean
      description: "Enable Prettier linter"
    prettier_extensions:
      default: "js,ts,json,md,yml,yaml"
      description: "Comma-separated list of file extensions to lint with Prettier"
    prettier_args:
      default: ""
      description: "Additional arguments for Prettier"
    prettier_dir:
      default: "."
      description: "Directory to run Prettier in"
    prettier_command_prefix:
      default: ""
      description: "Prefix for the Prettier command"

    # Clippy Configuration
    clippy:
      default: "false"
      type: boolean
      description: "Enable Clippy linter"
    clippy_extensions:
      default: "rs"
      description: "Comma-separated list of file extensions to lint with Clippy"
    clippy_args:
      default: ""
      description: "Additional arguments for Clippy"
    clippy_dir:
      default: "."
      description: "Directory to run Clippy in"
    clippy_command_prefix:
      default: ""
      description: "Prefix for the Clippy command"

    # Rustfmt Configuration
    rustfmt:
      default: "false"
      type: boolean
      description: "Enable Rustfmt linter"
    rustfmt_extensions:
      default: "rs"
      description: "Comma-separated list of file extensions to lint with Rustfmt"
    rustfmt_args:
      default: ""
      description: "Additional arguments for Rustfmt"
    rustfmt_dir:
      default: "."
      description: "Directory to run Rustfmt in"
    rustfmt_command_prefix:
      default: ""
      description: "Prefix for the Rustfmt command"

    # Svelte Configuration
    svelte:
      default: "false"
      type: boolean
      description: "Enable Svelte linter"
    svelte_extensions:
      default: "svelte"
      description: "Comma-separated list of file extensions to lint with Svelte"
    svelte_args:
      default: ""
      description: "Additional arguments for Svelte"
    svelte_dir:
      default: "."
      description: "Directory to run Svelte in"
    svelte_command_prefix:
      default: ""
      description: "Prefix for the Svelte command"

    # TSC Configuration
    tsc:
      default: "false"
      type: boolean
      description: "Enable TSC linter"
    tsc_extensions:
      default: "ts,tsx"
      description: "Comma-separated list of file extensions to lint with TSC"
    tsc_args:
      default: ""
      description: "Additional arguments for TSC"
    tsc_dir:
      default: "."
      description: "Directory to run TSC in"
    tsc_command_prefix:
      default: ""
      description: "Prefix for the TSC command"
---
gitlab_lint:
  stage: $[[ inputs.stage ]]
  image: registry.gitlab.com/profidev/gitlab-lint/gitlab-lint:$[[ component.version ]]
  variables:
    AUTO_FIX: "$[[ inputs.auto_fix ]]"
    COMMIT: "$[[ inputs.commit ]]"
    COMMIT_MESSAGE: "$[[ inputs.commit_message ]]"
    GIT_NO_VERIFY: "$[[ inputs.git_no_verify ]]"
    CONTINUE_ON_ERROR: "$[[ inputs.continue_on_error ]]"
    REPORT_PATH: "$[[ inputs.report_path ]]"
    GIT_USER: "$[[ inputs.git_user ]]"
    GIT_EMAIL: "$[[ inputs.git_email ]]"
    ACCESS_TOKEN: "$[[ inputs.access_token ]]"

    PRETTIER: "$[[ inputs.prettier ]]"
    PRETTIER_EXTENSIONS: "$[[ inputs.prettier_extensions ]]"
    PRETTIER_ARGS: "$[[ inputs.prettier_args ]]"
    PRETTIER_DIR: "$[[ inputs.prettier_dir ]]"
    PRETTIER_COMMAND_PREFIX: "$[[ inputs.prettier_command_prefix ]]"

    CLIPPY: "$[[ inputs.clippy ]]"
    CLIPPY_EXTENSIONS: "$[[ inputs.clippy_extensions ]]"
    CLIPPY_ARGS: "$[[ inputs.clippy_args ]]"
    CLIPPY_DIR: "$[[ inputs.clippy_dir ]]"
    CLIPPY_COMMAND_PREFIX: "$[[ inputs.clippy_command_prefix ]]"

    RUSTFMT: "$[[ inputs.rustfmt ]]"
    RUSTFMT_EXTENSIONS: "$[[ inputs.rustfmt_extensions ]]"
    RUSTFMT_ARGS: "$[[ inputs.rustfmt_args ]]"
    RUSTFMT_DIR: "$[[ inputs.rustfmt_dir ]]"
    RUSTFMT_COMMAND_PREFIX: "$[[ inputs.rustfmt_command_prefix ]]"

    SVELTE: "$[[ inputs.svelte ]]"
    SVELTE_EXTENSIONS: "$[[ inputs.svelte_extensions ]]"
    SVELTE_ARGS: "$[[ inputs.svelte_args ]]"
    SVELTE_DIR: "$[[ inputs.svelte_dir ]]"
    SVELTE_COMMAND_PREFIX: "$[[ inputs.svelte_command_prefix ]]"

    TSC: "$[[ inputs.tsc ]]"
    TSC_EXTENSIONS: "$[[ inputs.tsc_extensions ]]"
    TSC_ARGS: "$[[ inputs.tsc_args ]]"
    TSC_DIR: "$[[ inputs.tsc_dir ]]"
    TSC_COMMAND_PREFIX: "$[[ inputs.tsc_command_prefix ]]"

  script:
    - echo "Running gitlab-lint version $[[ component.version ]]."
    - |
      if [ ! -f /app/dist/index.mjs ]; then
        echo "Error: The gitlab-lint executable was not found at /app/dist/index.mjs."
        echo "Please ensure you are using the correct docker image for this component."
        exit 1
      fi
    - node /app/dist/index.mjs

  artifacts:
    reports:
      codequality: "$[[ inputs.report_path ]]"
    paths:
      - "$[[ inputs.report_path ]]"
    when: always
    expire_in: 1 week
